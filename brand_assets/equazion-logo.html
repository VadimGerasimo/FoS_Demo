<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Equazion Logo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet"/>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #EEECE8;
    }
    .logo-wrap {
      position: relative;
      display: inline-block;
      line-height: 1;
    }
    .logo-text {
      font-family: 'Bebas Neue', Impact, Arial, sans-serif;
      font-size: 84px;
      color: #1C1B19;
      letter-spacing: 1.5px;
      line-height: 1;
      display: inline-flex;
      align-items: flex-start;
      user-select: none;
      white-space: nowrap;
    }
    .logo-text .reg {
      font-family: Arial, sans-serif;
      font-size: 21px;
      line-height: 1;
      margin-top: 5px;
      margin-left: 2px;
      letter-spacing: 0;
    }
    #overlay {
      position: absolute;
      top: 0; left: 0;
      pointer-events: none;
      overflow: visible;
    }
    .tagline {
      margin-top: 9px;
      font-family: Arial, 'Helvetica Neue', sans-serif;
      font-size: 10.5px;
      letter-spacing: 4.2px;
      color: #1C1B19;
      font-weight: 400;
      text-align: center;
    }
    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo-wrap" id="logoWrap">
      <div class="logo-text">
        <span>e</span><span id="charQ">Q</span><span>UA</span><span id="charZ">Z</span><span>ION</span><span class="reg">®</span>
      </div>
      <svg id="overlay"></svg>
    </div>
    <div class="tagline">FROM A BROADER PERSPECTIVE</div>
  </div>

  <script>
    const NS = 'http://www.w3.org/2000/svg';
    function mk(tag, attrs) {
      const el = document.createElementNS(NS, tag);
      Object.entries(attrs).forEach(([k, v]) => el.setAttribute(k, v));
      return el;
    }

    function applyOverlays() {
      const wrap = document.getElementById('logoWrap');
      const ov   = document.getElementById('overlay');
      const qEl  = document.getElementById('charQ');
      const zEl  = document.getElementById('charZ');
      if (!wrap || !ov || !qEl || !zEl) return;

      const wR = wrap.getBoundingClientRect();
      if (wR.width < 10) return;

      const W = wR.width, H = wR.height;
      ov.setAttribute('width',  W);
      ov.setAttribute('height', H);
      ov.setAttribute('viewBox', `0 0 ${W} ${H}`);
      Object.assign(ov.style, {
        position: 'absolute', top: '0', left: '0',
        width: W + 'px', height: H + 'px',
        pointerEvents: 'none', overflow: 'visible'
      });

      const BG = '#EEECE8';
      ov.innerHTML = '';

      /* ── Q compass needle ── */
      const qR  = qEl.getBoundingClientRect();
      const qx  = qR.left - wR.left;
      const qy  = qR.top  - wR.top;
      const qw  = qR.width;
      const qh  = qR.height;
      const pad = qw * 0.1;
      ov.appendChild(mk('line', {
        x1: qx + qw * 0.07 - pad, y1: qy + qh * 0.09 - pad * 0.8,
        x2: qx + qw * 0.84 + pad, y2: qy + qh * 0.86 + pad * 0.8,
        stroke: BG, 'stroke-width': 6, 'stroke-linecap': 'round'
      }));

      /* ── Z pixel grid ── */
      const zR = zEl.getBoundingClientRect();
      const zx = zR.left - wR.left;
      const zy = zR.top  - wR.top;
      const zw = zR.width;
      const zh = zR.height;
      const sw = 2.6;
      for (let i = 1; i <= 4; i++) {
        const y = zy + zh * i / 5;
        ov.appendChild(mk('line', { x1: zx - 1, y1: y, x2: zx + zw + 1, y2: y,
          stroke: BG, 'stroke-width': sw }));
      }
      for (let i = 1; i <= 2; i++) {
        const x = zx + zw * i / 3;
        ov.appendChild(mk('line', { x1: x, y1: zy - 1, x2: x, y2: zy + zh + 1,
          stroke: BG, 'stroke-width': sw }));
      }
    }

    document.fonts.ready.then(() => {
      applyOverlays();
      setTimeout(applyOverlays, 100);
    });
    setTimeout(applyOverlays, 300);
    window.addEventListener('resize', applyOverlays);
  </script>
</body>
</html>
