<svg viewBox="0 0 38 38" width="38" height="38" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <mask id="q-mask">
      <!-- Show outer ring -->
      <circle cx="18" cy="17" r="11.2" fill="white"/>
      <!-- Cut out inner circle -->
      <circle cx="18" cy="17" r="6.4" fill="black"/>
      <!-- Cut diagonal slash -->
      <line x1="9.3" y1="7.1" x2="27.2" y2="27.1"
            stroke="black" stroke-width="3.8" stroke-linecap="round"/>
    </mask>
  </defs>
  <!-- Orange ring (inner hole + slash cut via mask) -->
  <circle cx="18" cy="17" r="11.2" fill="#E8941A" mask="url(#q-mask)"/>
  <!-- Tail -->
  <line x1="24.2" y1="23.5" x2="29.9" y2="29.1"
        stroke="#E8941A" stroke-width="4.2" stroke-linecap="round"/>
</svg>
